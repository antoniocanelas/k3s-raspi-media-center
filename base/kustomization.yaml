apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: htpc

labels:
- pairs:
    app: htpc

resources:
- namespace.yaml
- jackett
- radarr
- sonarr
- bazarr
- prowlarr
- transmission
- ingress-route.yaml
- readarr
- jellyfin
- kavita
- lidarr
- arr-nfs.yaml

patches:
- path: volumes_patch.yaml
- path: env_variables_patch.yaml

# Note: vars is still experimental in replacement but works for substitution
# Will be replaced with replacements in future Kustomize versions
vars:
  - name: SONARR
    objref:
      kind: Service
      name: sonarr
      apiVersion: v1
  - name: RADARR
    objref:
      kind: Service
      name: radarr
      apiVersion: v1
  - name: PROWLARR
    objref:
      kind: Service
      name: prowlarr
      apiVersion: v1
  - name: READARR
    objref:
      kind: Service
      name: readarr
      apiVersion: v1
  - name: KAVITA
    objref:
      kind: Service
      name: kavita
      apiVersion: v1
