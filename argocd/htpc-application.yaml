apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: media-center-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: ssh://git@github.com/antoniocanelas/k3s-raspi-media-center.git
    targetRevision: HEAD
    path: overlays/armhf
  destination:
    server: https://kubernetes.default.svc
    namespace: htpc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  revisionHistoryLimit: 10
