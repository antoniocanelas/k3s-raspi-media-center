apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: readarr
  name: readarr
spec:
  replicas: 1
  selector:
    matchLabels:
      run: readarr
  template:
    metadata:
      labels:
        run: readarr
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: chown
        image: busybox
        command:
        - sh
        - -c
        - chown -R 1000:1000 /config /books /comics /audiobooks
        volumeMounts:
        - mountPath: /config
          name: arr-data-pvc
          subPath: readarr
        - mountPath: /books
          name: arr-data-pvc
          subPath: media/books/books
        - mountPath: /audiobooks
          name: arr-data-pvc
          subPath: media/books/audiobooks
        - mountPath: /comics
          name: arr-data-pvc
          subPath: media/books/comics
      - name: config
        image: busybox
        command:
        - sh
        - -c
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        args:
        - |
          echo 'Configuring Readarr at startup...'
          if [[ ! -f /config/config.xml ]]; then
            echo 'Creating default config.xml with UrlBase=/readarr'
            echo '<Config><UrlBase>/readarr</UrlBase></Config>' > /config/config.xml
            echo 'Config created successfully'
          else
            echo 'Config already exists, skipping creation'
          fi
          echo 'Readarr startup config complete'
        volumeMounts:
        - mountPath: /config
          name: arr-data-pvc
          subPath: readarr
      containers:
      - name: readarr
        image: lscr.io/linuxserver/readarr:nightly-0.4.16.2788-ls395
        env:
        - name: PUID
          value: '1000'
        - name: PGID
          value: '1000'
        - name: TZ
          value: Pacific/Auckland
        ports:
        - containerPort: 8787
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl "http://localhost:8787/readarr/api/v1/health?ApiKey=$(sed -ne '/ApiKey/{s/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/p;q;}'
              </config/config.xml)"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl "http://localhost:8787/readarr/api/v1/system/status?ApiKey=$(sed
              -ne '/ApiKey/{s/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/p;q;}' </config/config.xml)"
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - mountPath: /config
          name: arr-data-pvc
          subPath: readarr
        - mountPath: /books
          name: arr-data-pvc
          subPath: media/books/books
        - mountPath: /audiobooks
          name: arr-data-pvc
          subPath: media/books/audiobooks
        - mountPath: /comics
          name: arr-data-pvc
          subPath: media/books/comics
        - mountPath: /downloads
          name: arr-data-pvc
          subPath: downloads
        - mountPath: /data
          name: arr-data-pvc
      volumes:
        - name: arr-data-pvc
          persistentVolumeClaim:
            claimName: arr-data-pvc
